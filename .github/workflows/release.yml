name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v0.0.1"
        required: true
        type: string
      prerelease:
        description: "Mark this release as a prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

  build:
    name: Build ${{ matrix.goos }} ${{ matrix.goarch }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Build archive
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist "build/codex-session-migrator_${VERSION}_${GOOS}_${GOARCH}"

          bin="codex-session-migrator"
          if [ "$GOOS" = "windows" ]; then
            bin="codex-session-migrator.exe"
          fi

          CGO_ENABLED=0 go build \
            -trimpath \
            -ldflags="-s -w" \
            -o "build/codex-session-migrator_${VERSION}_${GOOS}_${GOARCH}/${bin}" \
            ./cmd/codex-session-migrator

          cp README.md scripts/install.sh "build/codex-session-migrator_${VERSION}_${GOOS}_${GOARCH}/"

          if [ "$GOOS" = "windows" ]; then
            archive="codex-session-migrator_${VERSION}_${GOOS}_${GOARCH}.zip"
            (cd build && zip -r "../dist/${archive}" "codex-session-migrator_${VERSION}_${GOOS}_${GOARCH}")
          else
            archive="codex-session-migrator_${VERSION}_${GOOS}_${GOARCH}.tar.gz"
            tar -C build -czf "dist/${archive}" "codex-session-migrator_${VERSION}_${GOOS}_${GOARCH}"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-session-migrator-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: codex-session-migrator ${{ steps.version.outputs.version }}
          generate_release_notes: true
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          files: |
            dist/*
